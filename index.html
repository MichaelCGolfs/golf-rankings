<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Rankings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0c0c0c;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.18);
      --white: #f0ebe0;
      --gray: #888;
      --gray-light: #bbb;
      --green: #2a5c24;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── HEADER ── */
    .hdr {
      position: sticky; top: 0; z-index: 50;
      background: rgba(12,12,12,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 58px;
    }
    .hdr-logo {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.3rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.01em;
    }
    .hdr-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gray);
    }

    /* ── HERO ── */
    .hero {
      padding: 4rem 2rem 3rem;
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 2rem;
    }
    .hero-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900; line-height: 1;
      margin-bottom: 0.5rem;
    }
    .hero-left h1 em { font-style: italic; color: var(--gold); }
    .hero-left p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray); margin-top: 0.75rem;
    }
    .hero-stats {
      display: flex; gap: 2.5rem;
    }
    .stat-block { text-align: center; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 900; color: var(--gold); line-height: 1;
    }
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gray); margin-top: 0.2rem;
    }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1400px; margin: 0 auto;
      padding: 0 2rem 1.5rem;
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
    }
    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      padding: 0.55rem 1rem;
      width: 260px; outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--gold); }
    .search-box::placeholder { color: var(--gray); }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em;
      padding: 0.55rem 0.85rem;
      cursor: pointer; outline: none;
    }

    .count-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.12em;
      color: var(--gray); margin-left: auto;
    }

    /* ── TABLE ── */
    .table-wrap {
      max-width: 1400px; margin: 0 auto;
      padding: 0 2rem 6rem;
      overflow-x: auto;
    }
    table {
      width: 100%; border-collapse: collapse;
      min-width: 900px;
    }
    thead tr {
      border-bottom: 1px solid var(--gold-dim);
    }
    th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold);
      padding: 0.6rem 0.75rem;
      text-align: left; white-space: nowrap;
      cursor: pointer; user-select: none;
      transition: color 0.15s;
    }
    th:hover { color: var(--gold-light, #e8c96d); }
    th.sorted { color: #e8c96d; }
    th:first-child { text-align: center; width: 52px; }
    th.num { text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    tbody tr:hover { background: rgba(201,168,76,0.055); }
    tbody tr.r1  { background: rgba(201,168,76,0.10); }
    tbody tr.r2  { background: rgba(201,168,76,0.07); }
    tbody tr.r3  { background: rgba(201,168,76,0.05); }

    td {
      padding: 0.85rem 0.75rem;
      vertical-align: middle;
    }
    .td-rank {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.05rem;
      color: var(--gray);
    }
    .td-rank.g1 { color: var(--gold); font-size: 1.2rem; }
    .td-rank.g2 { color: #c4b46a; }
    .td-rank.g3 { color: #a89858; }

    .td-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1rem;
      color: var(--white); letter-spacing: 0.01em;
    }
    .td-sub {
      font-size: 0.68rem; letter-spacing: 0.08em;
      color: var(--gray); margin-top: 0.1rem;
    }

    .td-score {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.9rem;
    }

    /* score color scale */
    .sc-5  { color: #4caf50; }
    .sc-4  { color: #8bc34a; }
    .sc-35 { color: #cddc39; }
    .sc-3  { color: #ffc107; }
    .sc-2  { color: #ff7043; }
    .sc-1  { color: #ef5350; }

    .mini-bar-wrap {
      width: 44px; height: 3px;
      background: rgba(255,255,255,0.08);
      display: inline-block; vertical-align: middle;
      margin-left: 4px;
    }
    .mini-bar-fill {
      height: 100%; background: var(--gold); opacity: 0.7;
    }

    .td-price {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; color: var(--gray-light);
      text-align: center;
    }
    .td-rounds {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem; color: var(--gray-light);
      text-align: center;
    }

    .arrow-icon {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; color: var(--gold);
      opacity: 0; transition: opacity 0.15s, transform 0.15s;
      display: inline-block;
    }
    tbody tr:hover .arrow-icon { opacity: 1; transform: translateX(3px); }

    /* ── DIVIDER ROWS ── */
    .tier-divider td {
      padding: 0.35rem 0.75rem;
      background: var(--surface2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold);
      cursor: default;
    }
    .tier-divider:hover { background: var(--surface2) !important; }

    /* ── MODAL / COURSE PAGE ── */
    .overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      overflow-y: auto;
    }
    .overlay.open { display: block; }

    .modal {
      background: var(--black);
      max-width: 860px;
      margin: 3rem auto 6rem;
      border: 1px solid var(--border);
      position: relative;
    }

    .modal-close {
      position: sticky; top: 0; z-index: 10;
      display: flex; justify-content: flex-end;
      background: rgba(12,12,12,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
    }
    .close-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray); cursor: pointer; background: none; border: none;
      transition: color 0.15s;
    }
    .close-btn:hover { color: var(--white); }

    .modal-hero {
      background: var(--green);
      padding: 2.5rem 2.5rem 2rem;
      position: relative; overflow: hidden;
    }
    .modal-hero::before {
      content: attr(data-rank);
      position: absolute; right: -0.5rem; top: -1rem;
      font-family: 'Playfair Display', serif;
      font-size: 9rem; font-weight: 900;
      color: rgba(255,255,255,0.06); line-height: 1;
      pointer-events: none;
    }
    .modal-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(201,168,76,0.8); margin-bottom: 0.5rem;
    }
    .modal-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 900; line-height: 1.05;
    }

    .modal-meta-bar {
      background: var(--gold);
      display: flex; flex-wrap: wrap; gap: 0;
    }
    .meta-item {
      padding: 0.85rem 1.5rem;
      border-right: 1px solid rgba(0,0,0,0.15);
      flex: 1; min-width: 100px;
    }
    .meta-item:last-child { border-right: none; }
    .meta-lbl {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(12,12,12,0.55);
    }
    .meta-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; color: var(--black);
      margin-top: 0.1rem;
    }

    .modal-body {
      padding: 2rem 2.5rem;
    }

    /* photos */
    .photos-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 3px; margin-bottom: 2rem;
    }
    .photos-area img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
    }
    .photo-upload-zone {
      border: 1px dashed var(--border);
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--gray);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* review */
    .review-section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.25rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .review-text {
      font-size: 0.97rem; line-height: 1.8;
      color: rgba(240,235,224,0.85);
      margin-bottom: 2.5rem;
      font-style: italic;
    }
    .no-review {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; color: var(--gray);
      margin-bottom: 2.5rem; padding: 1.5rem;
      border: 1px dashed var(--border);
      text-align: center; letter-spacing: 0.1em;
    }

    /* ratings breakdown */
    .ratings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.1rem;
      margin-bottom: 2rem;
      background: var(--border);
    }
    .rating-cell {
      background: var(--surface);
      padding: 1rem 1.25rem;
    }
    .rating-cell-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 0.4rem;
    }
    .rating-cell-row {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .rating-bar-bg {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.07);
    }
    .rating-bar-fg {
      height: 100%; background: var(--gold);
      transition: width 0.8s ease;
    }
    .rating-cell-val {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      color: var(--gold); min-width: 32px; text-align: right;
    }

    /* score trio */
    .score-trio {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.1rem; background: var(--border); margin-bottom: 2rem;
    }
    .score-trio-item {
      background: var(--surface2);
      padding: 1.25rem; text-align: center;
    }
    .score-trio-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 0.4rem;
    }
    .score-trio-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; font-weight: 900; color: var(--gold);
    }

    /* pricing table */
    .pricing-table {
      width: 100%; border-collapse: collapse;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; margin-bottom: 2rem;
    }
    .pricing-table th {
      font-size: 0.6rem; letter-spacing: 0.15em; color: var(--gold);
      padding: 0.5rem 0.75rem; text-align: center;
      border-bottom: 1px solid var(--border);
      cursor: default;
    }
    .pricing-table td {
      padding: 0.55rem 0.75rem; text-align: center;
      color: var(--gray-light); border-bottom: 1px solid var(--border);
    }
    .pricing-table tr:last-child td { border-bottom: none; }
    .pricing-table td:first-child { text-align: left; color: var(--gray); }

    /* nav between courses */
    .modal-nav {
      display: flex; justify-content: space-between;
      padding-top: 1.5rem; border-top: 1px solid var(--border);
    }
    .modal-nav-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.7rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); cursor: pointer; background: none; border: none;
      transition: opacity 0.15s;
    }
    .modal-nav-btn:hover { opacity: 0.7; }
    .modal-nav-btn:disabled { color: var(--gray); cursor: default; }

    /* scrollbar */
    .overlay::-webkit-scrollbar { width: 6px; }
    .overlay::-webkit-scrollbar-track { background: transparent; }
    .overlay::-webkit-scrollbar-thumb { background: var(--border); }

    @media (max-width: 700px) {
      .hero { padding: 2rem 1rem 1.5rem; }
      .table-wrap { padding: 0 0.5rem 4rem; }
      .controls { padding: 0 1rem 1rem; }
      .hdr { padding: 0 1rem; }
      .modal { margin: 0; border: none; }
      .modal-body { padding: 1.5rem 1.25rem; }
      .modal-hero { padding: 2rem 1.25rem 1.5rem; }
      .ratings-grid { grid-template-columns: 1fr; }
      td:nth-child(5), td:nth-child(6), td:nth-child(7), th:nth-child(5), th:nth-child(6), th:nth-child(7) { display: none; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">The Card</div>
  <div class="hdr-meta">DFW Golf Rankings &mdash; <span id="hdrCount">80</span> Courses</div>
</header>

<div class="hero">
  <div class="hero-left">
    <h1>The <em>Card</em></h1>
    <p>Personal Rankings &amp; Course Reviews &mdash; Dallas / Fort Worth</p>
  </div>
  <div class="hero-stats">
    <div class="stat-block">
      <div class="stat-num">80</div>
      <div class="stat-label">Courses Ranked</div>
    </div>
    <div class="stat-block">
      <div class="stat-num" id="totalRounds">—</div>
      <div class="stat-label">Total Rounds</div>
    </div>
    <div class="stat-block">
      <div class="stat-num" id="avgExp">—</div>
      <div class="stat-label">Avg Experience</div>
    </div>
  </div>
</div>

<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="Search courses…">
  <select class="sort-select" id="sortSel">
    <option value="rank">Sort: Ranking</option>
    <option value="experience">Sort: Experience Score</option>
    <option value="courseScore">Sort: Course Score</option>
    <option value="value">Sort: Best Value</option>
    <option value="timesPlayed">Sort: Most Played</option>
    <option value="name">Sort: A–Z</option>
  </select>
  <div class="count-label" id="countLabel">Showing 80 courses</div>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th data-col="rank">#</th>
        <th data-col="name">Course</th>
        <th data-col="experience" class="num">Experience</th>
        <th data-col="courseScore" class="num">Course</th>
        <th data-col="greens" class="num">Greens</th>
        <th data-col="layout" class="num">Layout</th>
        <th data-col="value" class="num">Value</th>
        <th data-col="timesPlayed" class="num">Rounds</th>
        <th data-col="weekdayMorning" class="num">Rate</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-close">
      <button class="close-btn" id="closeBtn">✕ Close</button>
    </div>
    <div class="modal-hero" id="modalHero">
      <div class="modal-eyebrow" id="modalEyebrow"></div>
      <div class="modal-name" id="modalName"></div>
    </div>
    <div class="modal-meta-bar" id="modalMetaBar"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const REVIEWS = {
  "Coyote Ridge": `<p>Coyote Ridge is one of the strongest public tests in DFW because it combines real length with demanding second shots and a back nine that can turn on you quickly. It feels like a modern, athletic course that asks for committed ball striking, especially when you move back on the tee boxes. The front gives you enough space to settle in, but the course gets progressively more difficult as hazards and green complexes start influencing where you have to place the ball, not just hit it.</p><p>The defining stretch is 9 through 12, one of the toughest four-hole runs in the metroplex. It stacks length, water, and demanding approaches in a way that makes par feel earned. Conditioning is a major part of why the course works — fairways are typically lush, rough has enough thickness to take away spin, and bunkers are deep and consistently maintained. Greens roll smooth and true.</p><p>The facility side adds a lot. The range is large and high quality for a public course, and the clubhouse has a real country club feel. Coyote Ridge belongs in the top tier of DFW public golf.</p>`,
  "Firewheel Golf Park - Old Course": `<p>The Old Course just came back from a comprehensive renovation that replaced the greens, tees, and fairways top to bottom. Playing it fresh out of that overhaul, the difference is obvious. Everything feels new. The surfaces have that just-built integrity you can trust, and after years of being the most trafficked of the three Firewheel courses, it now looks and plays like it has been reset to factory settings.</p><p>The design is what it has always been — gently rolling terrain with slow moving streams, tree-lined corridors, and 65 strategically placed bunkers across a par 71 that plays closer to the shorter end of the DFW public spectrum. The greens are pure, consistent, and rolling true. They are running a little slow right now — early grow-in season — but that will sort itself out. The underlying quality is clearly there.</p><p>Overall, the renovation has done exactly what it was supposed to do. The Old Course is back, in the best condition it has been in years, and it gives DFW golfers a fun, gettable round on surfaces you can actually trust.</p>`,
  "Firewheel Golf Park - Lakes Course": `<p>Firewheel Lakes is the most penal and visually water-driven of the three Firewheel courses, and it plays like it knows it. Creeks and ponds are in the frame all day, and a lot of holes ask you to commit to a line because the bailouts either bring water into play or set up an awkward approach. When you are swinging well, it is a fun challenge with real shot value. When you are loose off the tee, it can turn into a grind quickly.</p><p>The greens are one of the stronger parts of the course — larger, with more movement than the other Firewheel layouts, which makes approach placement matter. The downside is the course can feel one-note because so many holes use the same water-pressure fear factor. Conditions are typical of a busy muni golf park. A good option when you want a tougher test at Firewheel, but the total package feels more like solid muni golf than a standout destination.</p>`,
};

// ── Helpers ──
function scoreColor(v) {
  if (!v) return '';
  if (v >= 4.5) return 'sc-5';
  if (v >= 4.0) return 'sc-4';
  if (v >= 3.5) return 'sc-35';
  if (v >= 3.0) return 'sc-3';
  if (v >= 2.0) return 'sc-2';
  return 'sc-1';
}
function fmt(v) { return v != null ? v.toFixed(2) : '—'; }
function fmtPrice(v) {
  if (!v || v === '' || v === 'x') return '—';
  return v;
}
function miniBar(v) {
  if (!v) return '';
  const pct = (v / 5) * 100;
  return `<span class="mini-bar-wrap"><span class="mini-bar-fill" style="width:${pct}%"></span></span>`;
}

// ── Stats ──
const totalRounds = DATA.reduce((s, c) => s + (c.timesPlayed || 0), 0);
const avgExp = DATA.reduce((s, c) => s + (c.experience || 0), 0) / DATA.length;
document.getElementById('totalRounds').textContent = totalRounds;
document.getElementById('avgExp').textContent = avgExp.toFixed(2);

// ── Render table ──
let currentSort = 'rank';
let currentSearch = '';
let filteredData = [...DATA];

const TIER_BREAKS = [
  { after: 10, label: 'Tier 2 — Top Courses' },
  { after: 25, label: 'Tier 3 — Good Tracks' },
  { after: 45, label: 'Tier 4 — Average' },
  { after: 60, label: 'Tier 5 — Below Average' },
];

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let sorted = [...DATA].filter(c => {
    if (!currentSearch) return true;
    return c.name.toLowerCase().includes(currentSearch.toLowerCase());
  });

  if (currentSort === 'rank') {
    sorted.sort((a, b) => a.rank - b.rank);
  } else if (currentSort === 'name') {
    sorted.sort((a, b) => a.name.localeCompare(b.name));
  } else if (currentSort === 'value') {
    sorted.sort((a, b) => (b.value || 0) - (a.value || 0));
  } else if (currentSort === 'timesPlayed') {
    sorted.sort((a, b) => (b.timesPlayed || 0) - (a.timesPlayed || 0));
  } else {
    sorted.sort((a, b) => (b[currentSort] || 0) - (a[currentSort] || 0));
  }

  filteredData = sorted;
  document.getElementById('countLabel').textContent = `Showing ${sorted.length} course${sorted.length !== 1 ? 's' : ''}`;
  document.getElementById('hdrCount').textContent = sorted.length;

  let lastTierInserted = -1;

  sorted.forEach((c, idx) => {
    // Tier dividers only when sorted by rank
    if (currentSort === 'rank' && !currentSearch) {
      TIER_BREAKS.forEach(tb => {
        if (c.rank === tb.after + 1 && lastTierInserted !== tb.after) {
          lastTierInserted = tb.after;
          const divRow = document.createElement('tr');
          divRow.className = 'tier-divider';
          divRow.innerHTML = `<td colspan="10">${tb.label}</td>`;
          tbody.appendChild(divRow);
        }
      });
    }

    const rankClass = c.rank === 1 ? 'g1' : c.rank <= 3 ? 'g2' : c.rank <= 10 ? 'g3' : '';
    const rowClass = c.rank === 1 ? 'r1' : c.rank === 2 ? 'r2' : c.rank === 3 ? 'r3' : '';

    const tr = document.createElement('tr');
    if (rowClass) tr.className = rowClass;
    tr.dataset.idx = idx;

    tr.innerHTML = `
      <td class="td-rank ${rankClass}">${c.rank}</td>
      <td>
        <div class="td-name">${c.name}</div>
        <div class="td-sub">Par ${c.par || '—'} &bull; ${c.distance ? c.distance.toFixed(0) + ' yds' : '—'} &bull; Slope ${c.slope || '—'}</div>
      </td>
      <td class="td-score ${scoreColor(c.experience)}">${fmt(c.experience)}${miniBar(c.experience)}</td>
      <td class="td-score ${scoreColor(c.courseScore)}">${fmt(c.courseScore)}</td>
      <td class="td-score ${scoreColor(c.greens)}">${fmt(c.greens)}</td>
      <td class="td-score ${scoreColor(c.layout)}">${fmt(c.layout)}</td>
      <td class="td-score ${scoreColor(c.value)}">${fmt(c.value)}</td>
      <td class="td-rounds">${c.timesPlayed > 0 ? c.timesPlayed : '—'}</td>
      <td class="td-price">${fmtPrice(c.weekdayMorning)}</td>
      <td><span class="arrow-icon">→</span></td>
    `;
    tr.addEventListener('click', () => openModal(idx));
    tbody.appendChild(tr);
  });
}

// ── Sort by column header click ──
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    currentSort = th.dataset.col;
    document.getElementById('sortSel').value = currentSort;
    renderTable();
  });
});

document.getElementById('sortSel').addEventListener('change', e => {
  currentSort = e.target.value;
  renderTable();
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderTable();
});

// ── Modal ──
let currentModalIdx = 0;

function openModal(idx) {
  currentModalIdx = idx;
  const c = filteredData[idx];

  document.getElementById('modalHero').dataset.rank = '#' + c.rank;
  document.getElementById('modalEyebrow').textContent = `Ranked #${c.rank} of ${DATA.length}`;
  document.getElementById('modalName').textContent = c.name;

  document.getElementById('modalMetaBar').innerHTML = `
    <div class="meta-item"><div class="meta-lbl">Experience</div><div class="meta-val">${fmt(c.experience)}</div></div>
    <div class="meta-item"><div class="meta-lbl">Course Score</div><div class="meta-val">${fmt(c.courseScore)}</div></div>
    <div class="meta-item"><div class="meta-lbl">Rounds Played</div><div class="meta-val">${c.timesPlayed > 0 ? c.timesPlayed : '—'}</div></div>
    <div class="meta-item"><div class="meta-lbl">Value Rating</div><div class="meta-val">${fmt(c.value)}</div></div>
  `;

  const reviewHtml = REVIEWS[c.name]
    ? `<div class="review-text">${REVIEWS[c.name]}</div>`
    : `<div class="no-review">No written review yet — add your notes in the REVIEWS object in the code.</div>`;

  const ratings = [
    { label: 'Maintenance', key: 'maintenance' },
    { label: 'Fairways', key: 'fairways' },
    { label: 'Rough / Waste', key: 'rough' },
    { label: 'Bunkers', key: 'bunkers' },
    { label: 'Greens', key: 'greens' },
    { label: 'Layout', key: 'layout' },
    { label: 'Difficulty', key: 'difficulty' },
    { label: 'Aura', key: 'aura' },
    { label: 'Range', key: 'range' },
    { label: 'Clubhouse / Bar', key: 'clubhouse' },
  ];

  const ratingsHtml = ratings.map(r => {
    const v = c[r.key];
    const pct = v != null ? (v / 5) * 100 : 0;
    return `
      <div class="rating-cell">
        <div class="rating-cell-label">${r.label}</div>
        <div class="rating-cell-row">
          <div class="rating-bar-bg"><div class="rating-bar-fg" style="width:${pct}%"></div></div>
          <div class="rating-cell-val">${v != null ? v.toFixed(2) : '—'}</div>
        </div>
      </div>
    `;
  }).join('');

  const priceHtml = `
    <div class="review-section-title">Green Fees</div>
    <table class="pricing-table">
      <thead><tr><th></th><th>Morning</th><th>Afternoon</th><th>Twilight</th></tr></thead>
      <tbody>
        <tr><td>Weekday</td><td>${fmtPrice(c.weekdayMorning)}</td><td>${fmtPrice(c.weekdayAfternoon)}</td><td>${fmtPrice(c.weekdayTwilight)}</td></tr>
        <tr><td>Weekend</td><td>${fmtPrice(c.weekendMorning)}</td><td>${fmtPrice(c.weekendAfternoon)}</td><td>${fmtPrice(c.weekendTwilight)}</td></tr>
      </tbody>
    </table>
  `;

  const prevDisabled = idx === 0 ? 'disabled' : '';
  const nextDisabled = idx === filteredData.length - 1 ? 'disabled' : '';

  document.getElementById('modalBody').innerHTML = `
    <div class="photo-upload-zone">📷 Drop photo URLs into the REVIEWS object to display images here</div>

    <div class="review-section-title">Written Review</div>
    ${reviewHtml}

    <div class="review-section-title">Score Summary</div>
    <div class="score-trio">
      <div class="score-trio-item">
        <div class="score-trio-label">Playability</div>
        <div class="score-trio-val">${fmt(c.playability)}</div>
      </div>
      <div class="score-trio-item">
        <div class="score-trio-label">Course</div>
        <div class="score-trio-val">${fmt(c.courseScore)}</div>
      </div>
      <div class="score-trio-item">
        <div class="score-trio-label">Experience</div>
        <div class="score-trio-val">${fmt(c.experience)}</div>
      </div>
    </div>

    <div class="review-section-title">Rating Breakdown</div>
    <div class="ratings-grid">${ratingsHtml}</div>

    ${priceHtml}

    <div class="review-section-title">Course Details</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.1rem;background:var(--border);margin-bottom:2rem;">
      <div class="score-trio-item"><div class="score-trio-label">Par</div><div class="score-trio-val" style="font-size:1.4rem">${c.par || '—'}</div></div>
      <div class="score-trio-item"><div class="score-trio-label">Distance</div><div class="score-trio-val" style="font-size:1.4rem">${c.distance ? c.distance.toFixed(0) + ' y' : '—'}</div></div>
      <div class="score-trio-item"><div class="score-trio-label">Slope / Index</div><div class="score-trio-val" style="font-size:1.4rem">${c.slope || '—'} / ${c.index || '—'}</div></div>
    </div>

    <div class="modal-nav">
      <button class="modal-nav-btn" ${prevDisabled} onclick="openModal(${idx - 1})">← Previous</button>
      <button class="modal-nav-btn" ${nextDisabled} onclick="openModal(${idx + 1})">Next →</button>
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.rating-bar-fg').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      setTimeout(() => bar.style.width = w, 50);
    });
  }, 20);
}

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('overlay').classList.remove('open');
  const ov = document.getElementById('overlay');
  if (ov.classList.contains('open')) {
    if (e.key === 'ArrowRight' && currentModalIdx < filteredData.length - 1) openModal(currentModalIdx + 1);
    if (e.key === 'ArrowLeft' && currentModalIdx > 0) openModal(currentModalIdx - 1);
  }
});

renderTable();
</script>
</body>
</html>
